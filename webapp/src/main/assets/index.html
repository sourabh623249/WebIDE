<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebIDE 接口功能测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            padding-bottom: 250px; /* 为底部日志留空间 */
        }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-top: 20px; }
        h4 { margin: 10px 0 5px 0; color: #555; }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 15px;
            margin-bottom: 15px;
        }

        /* 按钮网格布局 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background-color: #1f618d; transform: translateY(1px); }
        button.danger { background-color: #e74c3c; }
        button.success { background-color: #27ae60; }
        button.warning { background-color: #f39c12; }

        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 8px;
            font-family: monospace;
        }

        /* 底部日志控制台 */
        #console-log {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            background: #222;
            color: #0f0;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            overflow-y: auto;
            padding: 10px;
            border-top: 3px solid #444;
            z-index: 999;
        }
        .log-item { border-bottom: 1px solid #333; padding: 2px 0; }
        .log-err { color: #ff5555; }
    </style>
</head>
<body>

<!-- 配置区域 -->
<div class="card">
    <h4>🔌 接口配置</h4>
    <input type="text" id="bridgeName" value="websApp" placeholder="输入注入对象的名称 (默认 websApp)">
    <div style="font-size: 12px; color: #666;">
        当前状态: <span id="status">检测中...</span>
    </div>
</div>

<!-- 脚本执行区域 (核心功能) -->
<div class="card">
    <h2>🚀 动态脚本 (Java/BeanShell)</h2>
    <p style="font-size:12px; color:#666;">前提：App 需集成 BeanShell 或 Groovy 并在 evalJavaCode 中实现。</p>
    <textarea id="javaCode" rows="6" placeholder="在此输入 Java 代码...">import android.widget.Toast;
Toast.makeText(context, "Hello from BeanShell!", 1).show();
return "执行成功";</textarea>
    <div class="btn-group">
        <button class="success" onclick="runJava()">执行 Java 代码</button>
        <button onclick="runJs()">执行 JS 代码</button>
    </div>
</div>

<!-- 系统交互 -->
<div class="card">
    <h2>📱 系统与 UI</h2>
    <div class="btn-group">
        <button onclick="callApi('toast', '这是一个 Toast')">Toast 提示</button>
        <button onclick="testNotification()">发送通知</button>
        <button onclick="callApi('openFlashLight')">打开手电筒</button>
        <button onclick="callApi('closeFlashLight')">关闭手电筒</button>
        <button onclick="callApi('shockDevice', 500)">震动 500ms</button>
        <button onclick="getClip()">获取剪贴板</button>
        <button onclick="callApi('setClipContent', 'WebIDE 复制测试')">写入剪贴板</button>
    </div>

    <h4>状态栏/导航栏颜色</h4>
    <div class="btn-group">
        <button onclick="callApi('setStatuColor', '#FF0000')">红状态栏</button>
        <button onclick="callApi('setStatuColor', '#FFFFFF')">白状态栏</button>
        <button onclick="callApi('setNavColor', '#00FF00')">绿导航栏</button>
    </div>
</div>

<!-- 硬件信息 -->
<div class="card">
    <h2>🔋 硬件与状态</h2>
    <div class="btn-group">
        <button onclick="showRet('getBatteryTemperature')">电池温度</button>
        <button onclick="showRet('getMediaVolume')">媒体音量</button>
        <button onclick="showRet('getScreenBrightness')">屏幕亮度</button>
        <button onclick="showRet('getMemoryUsage')">内存占用</button>
        <button onclick="showRet('getDeviceStatus')">设备信息</button>
    </div>
</div>

<!-- 文件操作 -->
<div class="card">
    <h2>📂 文件系统</h2>
    <input type="text" id="filePath" value="/sdcard/webide_test.txt" placeholder="文件路径">
    <textarea id="fileContent" rows="3" placeholder="写入内容">Hello WebIDE File System</textarea>
    <div class="btn-group">
        <button onclick="doWriteFile()">写入文件</button>
        <button onclick="doReadFile()">读取文件</button>
        <button onclick="doListFiles()">列出目录(sdcard)</button>
        <button class="danger" onclick="doDeleteFile()">删除文件</button>
    </div>
    <div class="btn-group" style="margin-top:10px;">
        <button onclick="callApi('openFile', getValue('filePath'))">调用系统打开</button>
        <button onclick="callApi('installAPK', getValue('filePath'))">安装 APK</button>
    </div>
</div>

<!-- App 操作 -->
<div class="card">
    <h2>🛠 App 控制</h2>
    <div class="btn-group">
        <button onclick="showRet('getAppName')">App 名称</button>
        <button onclick="showRet('getAppVersion')">App 版本</button>
        <button class="warning" onclick="callApi('restartApp')">重启 App</button>
        <button class="danger" onclick="callApi('exitApp')">退出 App</button>
    </div>
</div>

<!-- 底部日志 -->
<div id="console-log">
    <div class="log-item">Ready. Waiting for commands...</div>
</div>

<script>
    // 获取注入对象名 (默认 websApp，但也可能是 Android)
    function getBridge() {
        var name = document.getElementById('bridgeName').value || 'websApp';
        return window[name];
    }

    function getValue(id) {
        return document.getElementById(id).value;
    }

    // 基础日志打印
    function log(msg, isError) {
        var consoleDiv = document.getElementById('console-log');
        var div = document.createElement('div');
        div.className = 'log-item' + (isError ? ' log-err' : '');

        var time = new Date().toLocaleTimeString();
        div.innerText = "[" + time + "] " + msg;

        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
        console.log(msg);
    }

    // 检测接口状态
    setInterval(function() {
        var bridge = getBridge();
        var statusSpan = document.getElementById('status');
        if (bridge) {
            statusSpan.innerText = "✅ 已连接 (" + document.getElementById('bridgeName').value + ")";
            statusSpan.style.color = "green";
        } else {
            statusSpan.innerText = "❌ 未找到对象";
            statusSpan.style.color = "red";
        }
    }, 1000);

    // 通用调用方法
    function callApi(methodName, ...args) {
        var bridge = getBridge();
        if (!bridge) {
            log("Error: 桥接对象未找到", true);
            return;
        }
        if (typeof bridge[methodName] === 'function') {
            try {
                log("调用: " + methodName + "(" + args.join(", ") + ")");
                bridge[methodName](...args);
            } catch (e) {
                log("调用异常: " + e.message, true);
            }
        } else {
            log("方法 " + methodName + " 不存在", true);
        }
    }

    // 调用并显示返回值
    function showRet(methodName, ...args) {
        var bridge = getBridge();
        if (!bridge) return log("Bridge not found", true);

        try {
            var ret = bridge[methodName](...args);
            log(methodName + " 返回: " + ret);
            return ret;
        } catch (e) {
            log(methodName + " 错误: " + e.message, true);
        }
    }

    // --- 具体功能实现 ---

    // 1. 运行 Java 代码 (BeanShell/Groovy)
    function runJava() {
        var code = document.getElementById('javaCode').value;
        callApi('evalJavaCode', code);
    }

    // 2. 运行 JS 代码 (evalJsCode)
    function runJs() {
        // 测试反向注入
        callApi('evalJsCode', 'alert("这是由 Android 调起的 JS Alert");');
    }

    // 3. 通知测试
    function testNotification() {
        // 调用 adapter.sendNotification(title, content)
        callApi('sendNotification', 'WebIDE 通知', '这是一条来自网页的消息');
    }

    // 4. 获取剪贴板
    function getClip() {
        var content = showRet('getClipContent');
        if(content) alert("剪贴板内容:\n" + content);
    }

    // 5. 文件写入
    function doWriteFile() {
        var path = getValue('filePath');
        var content = getValue('fileContent');
        callApi('writeFile', path, content);
        log("写入指令已发送");
    }

    // 6. 文件读取
    function doReadFile() {
        var path = getValue('filePath');
        var content = showRet('readFile', path);
        if (content) {
            document.getElementById('fileContent').value = content;
        }
    }

    // 7. 列出文件
    function doListFiles() {
        var path = "/sdcard/";
        var result = showRet('listFiles', path);
        // Adapter 中用 [FG] 分割
        if (result) {
            var files = result.split("[FG]");
            log("文件列表: " + files.join(", "));
            alert("SD卡根目录文件:\n" + files.slice(0, 10).join("\n") + "\n(仅显示前10个)");
        }
    }

    // 8. 删
    function doDeleteFile() {
        var path = getValue('filePath');
        if(confirm("确定删除 " + path + " 吗？")) {
            callApi('deletFiles', path); // 注意你的 Kotlin 方法名是 deletFiles (拼写是这样的)
            log("删除指令已发送");
        }
    }

</script>
</body>
</html>
