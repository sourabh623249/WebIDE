name: Android CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'zh_CN/**'
      - '**/*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - all
      outputFormat:
        description: 'Output format'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - apks
          - all
      module:
        description: 'Gradle module (e.g., :app)'
        required: true
        default: ':app'
        type: string

concurrency:
  group: theme-store-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_auto:
    name: Auto Build (Debug + Release)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-auto
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-auto
          path: app/build/outputs/apk/release/*.apk

  build_debug:
    name: Build Debug (Manual)
    if: |
      github.event_name == 'workflow_dispatch' && inputs.buildType == 'debug' || 
      (github.event_name == 'workflow_dispatch' && inputs.buildType == 'all' && inputs.outputFormat == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug
        env:
          MODULE: ${{ inputs.module }}
        run: |
          ./gradlew "$MODULE":assembleDebug --stacktrace
          # 如果选择了 aab 或 all，也构建 AAB
          if [[ "${{ inputs.outputFormat }}" == "aab" || "${{ inputs.outputFormat }}" == "all" ]]; then
            ./gradlew "$MODULE":bundleDebug --stacktrace
          fi
          # 如果选择了 apks 或 all，也构建 APKS
          if [[ "${{ inputs.outputFormat }}" == "apks" || "${{ inputs.outputFormat }}" == "all" ]]; then
            ./gradlew "$MODULE":bundleDebug --stacktrace
            # 使用 bundletool 生成 APKS（需要先下载 bundletool）
            curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.18.2/bundletool-all-1.18.2.jar
            # 提取模块名（去掉冒号前缀）
            MODULE_NAME=$(echo "$MODULE" | sed 's/^://')
            java -jar bundletool.jar build-apks --bundle="$MODULE_NAME/build/outputs/bundle/debug/$MODULE_NAME-debug.aab" --output="$MODULE_NAME/build/outputs/apks/debug/$MODULE_NAME-debug.apks" --mode=universal
          fi

      - name: Upload Debug APK
        if: inputs.outputFormat == 'apk' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Debug AAB
        if: inputs.outputFormat == 'aab' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-aab
          path: app/build/outputs/bundle/debug/*.aab

      - name: Upload Debug APKS
        if: inputs.outputFormat == 'apks' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apks
          path: app/build/outputs/apks/debug/*.apks

  build_release:
    name: Build Release (Manual, requires approval)
    if: |
      github.event_name == 'workflow_dispatch' && inputs.buildType == 'release' || 
      (github.event_name == 'workflow_dispatch' && inputs.buildType == 'all' && inputs.outputFormat == 'all')
    runs-on: ubuntu-latest
    # 配置仓库
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 请在仓库 Secrets 中配置 ANDROID_KEYSTORE 等变量
      - name: Build Release
        env:
          MODULE: ${{ inputs.module }}
        run: |
          ./gradlew "$MODULE":assembleRelease --stacktrace
          # 如果选择了 aab 或 all，也构建 AAB
          if [[ "${{ inputs.outputFormat }}" == "aab" || "${{ inputs.outputFormat }}" == "all" ]]; then
            ./gradlew "$MODULE":bundleRelease --stacktrace
          fi
          # 如果选择了 apks 或 all，也构建 APKS
          if [[ "${{ inputs.outputFormat }}" == "apks" || "${{ inputs.outputFormat }}" == "all" ]]; then
            ./gradlew "$MODULE":bundleRelease --stacktrace
            # 使用 bundletool 生成 APKS（下载 bundletool）
            curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.18.2/bundletool-all-1.18.2.jar
            # 提取模块名
            MODULE_NAME=$(echo "$MODULE" | sed 's/^://')
            java -jar bundletool.jar build-apks --bundle="$MODULE_NAME/build/outputs/bundle/release/$MODULE_NAME-release.aab" --output="$MODULE_NAME/build/outputs/apks/release/$MODULE_NAME-release.apks" --mode=universal
          fi

      - name: Upload Release APK
        if: inputs.outputFormat == 'apk' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        if: inputs.outputFormat == 'aab' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload Release APKS
        if: inputs.outputFormat == 'apks' || inputs.outputFormat == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: app/build/outputs/apks/release/*.apks

